<div class="container">
  <header>
    <h1>Angular 21</h1>
    <p class="subtitle">Utilisation de composants Material Design</p>
    <p>Version du 2026-05-11</p>
  </header>
  <main>
    <section>
      <h2>button</h2>
      <button matButton="outlined">Basic</button>
      <button matButton="outlined" disabled>Disabled</button>
      <a matButton="outlined" href="https://www.google.com/" target="_blank">Link</a>
    </section>
    <section>
      <h2>mat-grid-list</h2>
      <mat-grid-list cols="2" rowHeight="4:1">
        <mat-grid-tile>Rectangle 1</mat-grid-tile>
        <mat-grid-tile>Rectangle 2</mat-grid-tile>
        <mat-grid-tile>Rectangle 3</mat-grid-tile>
        <mat-grid-tile>Rectangle 4</mat-grid-tile>
      </mat-grid-list>
    </section>
    <section>
      <h2>mat-slide-toggle</h2>
      <fieldset>
        <legend>Legend</legend>
        <mat-slide-toggle>Option 1</mat-slide-toggle>
        <mat-slide-toggle>Option 2</mat-slide-toggle>
        <mat-slide-toggle>Option 3</mat-slide-toggle>
      </fieldset>
    </section>
  </main>
  <footer>Ghislain Coutu 2025</footer>
</div>

<router-outlet />
